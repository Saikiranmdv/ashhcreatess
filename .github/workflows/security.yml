name: Security Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  audit:
    name: npm security audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: audit
        continue-on-error: true
        run: |
          npm audit --audit-level=low --json > audit-output.json
          audit_code=$?
          echo "exit_code=$audit_code" >> $GITHUB_OUTPUT
          echo "has_output=true" >> $GITHUB_OUTPUT
          
      - name: Debug audit output
        run: |
          echo "Audit exit code: $(cat "$GITHUB_OUTPUT" | grep exit_code)"
          echo "File size: $(wc -c < audit-output.json)"
          head -20 audit-output.json

      - name: Comment npm audit findings on PR
        if: steps.audit.outputs.has_output == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            console.log('Starting audit comment...');
            
            try {
              const auditData = fs.readFileSync('audit-output.json', 'utf8');
              console.log('Audit file read, size:', auditData.length);
              
              const audit = JSON.parse(auditData);
              console.log('JSON parsed successfully');
              
              const prNumber = context.payload.pull_request.number;
              console.log('PR number:', prNumber);
              
              const metadata = audit.metadata || {};
              const vulnerabilities = metadata.vulnerabilities || {};
              console.log('Vulnerabilities object:', vulnerabilities);
              
              const summary = Object.entries(vulnerabilities)
                .map(([severity, count]) => `${severity}: ${count}`)
                .join(' | ') || 'No vulnerabilities found';
              const totalVulns = Object.values(vulnerabilities).reduce((sum, count) => sum + count, 0);
              const title = totalVulns > 0 ? '**Vulnerabilities found**' : '**No vulnerabilities found**';
              let body = `### npm audit results\n\n${title}\n\n**Summary:** ${summary}\n\n`;
              if (totalVulns > 0) {
                body += `> This workflow will fail when vulnerabilities are detected.\n\n`;
              }
              body += `<details>\n<summary>Raw audit output</summary>\n\n\`\`\`json\n${JSON.stringify(audit, null, 2)}\n\`\`\`\n</details>`;
              
              console.log('Comment body prepared, length:', body.length);
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              
              console.log('Comment posted successfully!');
            } catch (error) {
              console.error('Error:', error.message);
              console.error('Stack:', error.stack);
              throw error;
            }

      - name: Fail on vulnerabilities
        if: steps.audit.outputs.exit_code != '0'
        run: |
          echo "npm audit detected vulnerabilities."
          exit 1
